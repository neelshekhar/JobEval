<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiggy Job Evaluation — IPE Framework</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f6f3;
      --bg-tertiary: #f0ede8;
      --text-primary: #1a1a18;
      --text-secondary: #5c5b57;
      --text-tertiary: #8c8b85;
      --border: rgba(0,0,0,0.10);
      --border-md: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --green: #1D9E75;
      --green-bg: #E1F5EE;
      --green-border: #5DCAA5;
      --green-text: #085041;
      --green-dark: #0F6E56;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0ede8;
        --text-secondary: #a8a69f;
        --text-tertiary: #6e6d68;
        --border: rgba(255,255,255,0.10);
        --border-md: rgba(255,255,255,0.18);
        --green-bg: #0a2e21;
        --green-border: #0F6E56;
        --green-text: #9FE1CB;
        --green-dark: #5DCAA5;
      }
    }

    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      line-height: 1.6;
    }

    .container { max-width: 680px; margin: 0 auto; }

    .page-header { margin-bottom: 2rem; }
    .page-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-tertiary); margin-bottom: 6px;
    }
    .page-title { font-size: 24px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
    .page-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

    .summary-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .summary-inner { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .ipe-total { font-size: 32px; font-weight: 500; color: var(--text-primary); }
    .ipe-max { font-size: 16px; color: var(--text-tertiary); }
    .band-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--green-bg); border: 0.5px solid var(--green-border);
      border-radius: 20px; padding: 4px 14px;
      font-size: 13px; color: var(--green-dark); font-weight: 500; margin-top: 8px;
    }
    .band-ranges { text-align: right; }
    .band-range-row {
      font-size: 12px; color: var(--text-tertiary);
      line-height: 1.9; transition: color .2s;
    }
    .band-range-row.active { color: var(--green-dark); font-weight: 500; }

    .progress-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .progress-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-tertiary); margin-bottom: 6px; }
    .progress-count { font-size: 15px; color: var(--text-primary); margin-bottom: 10px; }
    .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .3s ease; }

    .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }

    .breakdown-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-tertiary); margin-bottom: 10px;
    }
    .factor-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
    .factor-row-name { font-size: 12px; color: var(--text-secondary); width: 160px; flex-shrink: 0; }
    .mini-bar-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .35s; }
    .factor-row-pts { font-size: 12px; color: var(--text-tertiary); width: 56px; text-align: right; flex-shrink: 0; }

    .radar-wrap { position: relative; width: 100%; height: 280px; margin: 1rem 0 0.5rem; }

    .factor-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .factor-header {
      padding: 13px 14px 11px;
      cursor: pointer;
      display: flex; align-items: flex-start; gap: 10px;
      transition: background .15s;
    }
    .factor-header:hover { background: var(--bg-secondary); }
    .factor-icon {
      width: 30px; height: 30px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 13px; font-weight: 500;
    }
    .factor-meta { flex: 1; min-width: 0; }
    .factor-name { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
    .factor-swiggy { font-size: 12px; color: var(--text-tertiary); }
    .factor-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .score-pill {
      font-size: 12px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
    }
    .wt-pill { font-size: 11px; color: var(--text-tertiary); }
    .arrow {
      font-size: 10px; color: var(--text-tertiary);
      margin-left: 4px; display: inline-block; transition: transform .2s;
    }
    .open .arrow { transform: rotate(180deg); }

    .factor-body {
      padding: 0 14px 14px;
      border-top: 0.5px solid var(--border);
    }

    .factor-definition {
      font-size: 12.5px; color: var(--text-secondary);
      line-height: 1.65; padding: 10px 0 2px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 2px;
    }

    .level-grid {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 5px; margin: 12px 0 10px;
    }
    .level-btn {
      padding: 6px 3px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: transparent;
      cursor: pointer;
      font-size: 11px; color: var(--text-secondary);
      font-family: inherit;
      text-align: center; line-height: 1.4;
      transition: all .15s;
    }
    .level-btn:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-bg); }
    .level-btn.active { border-color: var(--green); background: var(--green-bg); color: var(--green-dark); font-weight: 500; }

    /* Guidance panel */
    .guidance-panel { margin-top: 4px; }
    .guidance-section { margin-bottom: 10px; }

    .guidance-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-tertiary); margin-bottom: 6px; font-weight: 500;
    }
    .guidance-bullets {
      list-style: none; padding: 0;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 8px 12px;
    }
    .guidance-bullets li {
      font-size: 12.5px; color: var(--text-secondary);
      padding: 3px 0 3px 16px; position: relative; line-height: 1.55;
    }
    .guidance-bullets li::before {
      content: '–'; position: absolute; left: 0; color: var(--text-tertiary);
    }

    .shift-box {
      background: var(--green-bg);
      border-left: 2px solid var(--green-border);
      padding: 10px 12px;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin-top: 8px;
    }
    .shift-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
      color: var(--green-dark); margin-bottom: 5px; font-weight: 600;
    }
    .shift-text {
      font-size: 12.5px; color: var(--green-text); line-height: 1.65;
      font-style: italic;
    }
    .next-bullets {
      list-style: none; padding: 0; margin-top: 8px;
    }
    .next-bullets li {
      font-size: 12px; color: var(--green-text);
      padding: 2px 0 2px 18px; position: relative; line-height: 1.5;
    }
    .next-bullets li::before {
      content: '→'; position: absolute; left: 0;
      color: var(--green); font-size: 11px; line-height: 1.5;
    }

    .top-level-note {
      font-size: 12px; color: var(--text-tertiary);
      font-style: italic; padding: 8px 0;
    }

    .empty-guidance {
      font-size: 12px; color: var(--text-tertiary);
      font-style: italic; padding: 10px 0;
    }

    .score-bar-wrap { margin-top: 12px; }
    .score-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width .35s ease; }
    .score-bar-labels {
      display: flex; justify-content: space-between; margin-top: 4px;
      font-size: 11px; color: var(--text-tertiary);
    }

    .cta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.5rem; }
    .btn-primary {
      padding: 10px 22px; border: none; border-radius: var(--radius-md);
      background: var(--green); color: white;
      font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-sec {
      padding: 10px 18px; border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md); background: transparent;
      color: var(--text-secondary); font-size: 14px; cursor: pointer;
      font-family: inherit; transition: background .15s;
    }
    .btn-sec:hover { background: var(--bg-secondary); }

    .footer {
      text-align: center; margin-top: 3rem;
      font-size: 12px; color: var(--text-tertiary);
    }

    @media (max-width: 500px) {
      .level-grid { grid-template-columns: repeat(3, 1fr); }
      .summary-inner { flex-direction: column; }
      .band-ranges { text-align: left; }
      .factor-row-name { width: 120px; }
    }
  </style>
</head>

const BAND_RANGES = [
  {band:"B6 — Assistant Manager", min:0,   max:179},
  {band:"B7 — Manager",           min:180,  max:219},
  {band:"B8 — Senior Manager",    min:220,  max:269},
  {band:"B9 — General Manager",   min:270,  max:319},
  {band:"B10 — Director",         min:320,  max:369},
  {band:"B11 — AVP",              min:370,  max:999}
];

let selections = {};
let expanded = {};
FACTORS.forEach(f => { selections[f.id] = null; expanded[f.id] = false; });

let radarChart = null;

function totalScore() {
  return FACTORS.reduce((a, f) => a + (selections[f.id] !== null ? f.levels[selections[f.id]].pts : 0), 0);
}
function maxScore() { return FACTORS.reduce((a,f) => a + f.levels[5].pts, 0); }
function completedCount() { return FACTORS.filter(f => selections[f.id] !== null).length; }
function getBand(score) {
  for (const b of BAND_RANGES) if (score >= b.min && score <= b.max) return b.band;
  return "Below B6";
}

function renderSummary() {
  const total = totalScore();
  const completed = completedCount();
  const el = document.getElementById('summary');

  if (completed === FACTORS.length) {
    const bandLabel = getBand(total);
    let rangeRows = BAND_RANGES.map(b => {
      const active = bandLabel.startsWith(b.band.split(' ')[0]);
      return `<div class="band-range-row${active?' active':''}">${b.band}: ${b.min}–${b.max===999?'486+':b.max}</div>`;
    }).join('');

    let factorRows = FACTORS.map(f => {
      const sel = selections[f.id];
      const pts = sel !== null ? f.levels[sel].pts : 0;
      const pct = Math.round((pts / f.levels[5].pts) * 100);
      return `<div class="factor-row">
        <div class="factor-row-name">${f.name}</div>
        <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
        <div class="factor-row-pts">${pts} / ${f.levels[5].pts}</div>
      </div>`;
    }).join('');

    el.innerHTML = `<div class="summary-card">
      <div class="summary-inner">
        <div>
          <div class="page-label">IPE total score</div>
          <div class="ipe-total">${total} <span class="ipe-max">/ ${maxScore()}</span></div>
          <div class="band-chip">${bandLabel}</div>
        </div>
        <div class="band-ranges">${rangeRows}</div>
      </div>
      <div class="divider"></div>
      <div class="breakdown-label">Factor breakdown</div>
      ${factorRows}
      <div class="radar-wrap">
        <canvas id="radarChart" role="img" aria-label="Radar chart showing percentage scores across five IPE factors"></canvas>
      </div>
    </div>`;

    setTimeout(() => {
      const ctx = document.getElementById('radarChart');
      if (!ctx) return;
      if (radarChart) radarChart.destroy();
      const data = FACTORS.map(f => {
        const sel = selections[f.id];
        return sel !== null ? Math.round((f.levels[sel].pts / f.levels[5].pts) * 100) : 0;
      });
      radarChart = new Chart(ctx, {
        type:'radar',
        data:{
          labels: FACTORS.map(f => f.name),
          datasets:[{
            label:'Score (%)',
            data,
            borderColor:'#1D9E75',
            backgroundColor:'rgba(29,158,117,0.10)',
            pointBackgroundColor:'#1D9E75',
            pointRadius:5,
            borderWidth:1.5
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{r:{
            min:0, max:100,
            ticks:{display:false},
            grid:{color:'rgba(136,135,128,0.15)'},
            pointLabels:{font:{size:11}}
          }}
        }
      });
    }, 50);

  } else {
    const pct = Math.round(completed / FACTORS.length * 100);
    el.innerHTML = `<div class="progress-card">
      <div class="progress-label">Progress</div>
      <div class="progress-count">${completed} of ${FACTORS.length} competencies scored</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }
}

function renderGuidance(f, sel) {
  const lv = f.levels[sel];
  const nextLevel = sel < f.levels.length - 1 ? f.levels[sel + 1] : null;
  const pct = Math.round((lv.pts / f.levels[5].pts) * 100);

  const behaviorItems = lv.behaviors.map(b => `<li>${b}</li>`).join('');

  const shiftSection = lv.shift
    ? `<div class="shift-box">
        <div class="shift-label">To reach ${nextLevel ? nextLevel.band + ' — ' + bandName(nextLevel.band) : 'next level'}</div>
        <div class="shift-text">${lv.shift}</div>
        ${lv.nextBehaviors ? `<ul class="next-bullets">${lv.nextBehaviors.map(b => `<li>${b}</li>`).join('')}</ul>` : ''}
      </div>`
    : `<div class="top-level-note">You are at the highest band (B11 — AVP). This is the ceiling of the levelling framework.</div>`;

  return `
    <div class="guidance-panel">
      <div class="guidance-section">
        <div class="guidance-label">At ${lv.band} you are expected to</div>
        <ul class="guidance-bullets">${behaviorItems}</ul>
      </div>
      ${shiftSection}
    </div>
    <div class="score-bar-wrap">
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
      <div class="score-bar-labels"><span>${f.levels[0].pts} min</span><span>${f.levels[5].pts} max</span></div>
    </div>`;
}

function bandName(band) {
  const names = { B6:'AM', B7:'Manager', B8:'Sr. Manager', B9:'GM', B10:'Director', B11:'AVP' };
  return names[band] || band;
}

function renderFactors() {
  const el = document.getElementById('factors');
  el.innerHTML = FACTORS.map(f => {
    const sel = selections[f.id];
    const isOpen = expanded[f.id];
    const pts = sel !== null ? f.levels[sel].pts : null;

    const pill = pts !== null
      ? `<div class="score-pill" style="background:${f.pillBg};color:${f.pillColor}">${pts} pts &nbsp; ${f.levels[sel].band}</div>`
      : `<div class="score-pill" style="background:var(--bg-secondary);color:var(--text-tertiary)">Not scored</div>`;

    const levelBtns = f.levels.map((l, li) =>
      `<button class="level-btn${sel===li?' active':''}" onclick="selectLevel('${f.id}',${li})">
        <div>${l.band}</div><div style="opacity:.7">${l.pts}pts</div>
      </button>`
    ).join('');

    const body = isOpen ? `<div class="factor-body">
      <p class="factor-definition">${f.definition}</p>
      <div class="level-grid">${levelBtns}</div>
      ${sel !== null
        ? renderGuidance(f, sel)
        : `<div class="empty-guidance">Select a band above to see what's expected and what changes to reach the next level.</div>`
      }
    </div>` : '';

    return `<div class="factor-card">
      <div class="factor-header${isOpen?' open':''}" onclick="toggleExpand('${f.id}')">
        <div class="factor-icon" style="background:${f.iconBg};color:${f.iconColor}">${f.mercer[0]}</div>
        <div class="factor-meta">
          <div class="factor-name">${f.name} <span class="arrow">&#9650;</span></div>
          <div class="factor-swiggy">Mercer: ${f.mercer} &nbsp;·&nbsp; Swiggy: ${f.swiggy} &nbsp;·&nbsp; Weight: ${f.weight}%</div>
        </div>
        <div class="factor-right">${pill}</div>
      </div>
      ${body}
    </div>`;
  }).join('');
}

function renderCTA() {
  const el = document.getElementById('cta');
  if (completedCount() === FACTORS.length) {
    el.innerHTML = `<div class="cta-row">
      <button class="btn-sec" onclick="resetAll()">Reset scores</button>
    </div>`;
  } else {
    el.innerHTML = '';
  }
}

function render() {
  renderSummary();
  renderFactors();
  renderCTA();
}

function toggleExpand(id) {
  expanded[id] = !expanded[id];
  render();
}

function selectLevel(id, idx) {
  selections[id] = idx;
  expanded[id] = true;
  render();
}

function resetAll() {
  FACTORS.forEach(f => { selections[f.id] = null; expanded[f.id] = false; });
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  render();
}

render();
</script>
